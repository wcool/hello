<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Code Dance ✦</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Fira Code', 'Courier New', monospace;
      overflow: hidden;
    }

    /* ── 배경 파티클 ── */
    #particles {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .particle {
      position: absolute;
      font-size: 1.2rem;
      animation: floatUp linear infinite;
      opacity: 0;
    }
    @keyframes floatUp {
      0%   { transform: translateY(100vh) scale(0.5); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }

    /* ── 배너 ── */
    .banner {
      position: relative; z-index: 1;
      border: 3px solid #e07b39;
      border-radius: 12px;
      padding: 10px 32px;
      margin-bottom: 24px;
      background: rgba(224,123,57,0.08);
      box-shadow: 0 0 32px rgba(224,123,57,0.3), inset 0 0 16px rgba(224,123,57,0.05);
      animation: bannerGlow 2s ease-in-out infinite alternate;
    }
    @keyframes bannerGlow {
      from { box-shadow: 0 0 20px rgba(224,123,57,0.3); border-color: #e07b39; }
      to   { box-shadow: 0 0 50px rgba(255,180,50,0.5); border-color: #ffb432; }
    }
    .banner h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 6px;
      text-align: center;
      background: linear-gradient(90deg, #e07b39, #ffb432, #ff6a00, #e07b39);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 2s linear infinite;
    }
    @keyframes shimmer { to { background-position: 200%; } }

    /* ── 스테이지 ── */
    #stage {
      position: relative; z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── 로고 (SVG 스타버스트) ── */
    #logo-wrap {
      width: 150px; height: 150px;
      position: relative;
      margin-bottom: 4px;
    }
    #logo-svg {
      width: 100%; height: 100%;
      filter: drop-shadow(0 0 18px #e07b39);
      animation: logoSpin 8s linear infinite;
      transform-origin: center;
    }
    @keyframes logoSpin {
      0%   { filter: drop-shadow(0 0 12px #e07b39); }
      25%  { filter: drop-shadow(0 0 28px #ffb432); }
      50%  { filter: drop-shadow(0 0 12px #ff6a00); }
      75%  { filter: drop-shadow(0 0 28px #ffdd00); }
      100% { filter: drop-shadow(0 0 12px #e07b39); }
    }
    /* Eyes */
    .eye {
      position: absolute;
      width: 14px; height: 14px;
      background: #fff;
      border-radius: 50%;
      top: 50%; transform: translateY(-60%);
      animation: blink 3s ease-in-out infinite;
    }
    .eye.left  { left: 38%; }
    .eye.right { right: 38%; }
    @keyframes blink {
      0%,45%,55%,100% { transform: translateY(-60%) scaleY(1); }
      50% { transform: translateY(-60%) scaleY(0.1); }
    }

    /* ── 몸통 ── */
    #body-text {
      font-size: 1.6rem;
      line-height: 1.45;
      color: #f0f0f0;
      text-align: center;
      text-shadow: 0 0 8px rgba(224,123,57,0.5);
      min-height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.12s;
    }
    #body-text pre { font-family: inherit; }

    /* ── 태그 ── */
    #tag {
      margin-top: 14px;
      font-size: 1.15rem;
      font-weight: 700;
      color: #ffb432;
      text-shadow: 0 0 12px #ff6a00;
      min-height: 2rem;
      animation: tagPulse 0.9s ease-in-out infinite alternate;
    }
    @keyframes tagPulse {
      from { opacity: 0.7; transform: scale(0.97); }
      to   { opacity: 1.0; transform: scale(1.03); }
    }

    /* ── 별 스트립 ── */
    #stars {
      margin-top: 20px;
      font-size: 1rem;
      color: #e07b39;
      letter-spacing: 3px;
      animation: starsScroll 1s linear infinite;
    }
    @keyframes starsScroll {
      0%   { letter-spacing: 3px; }
      50%  { letter-spacing: 6px; color: #ffb432; }
      100% { letter-spacing: 3px; }
    }

    /* ── 힌트 ── */
    #hint {
      margin-top: 28px;
      font-size: 0.78rem;
      color: rgba(224,123,57,0.5);
      letter-spacing: 2px;
      position: relative; z-index: 1;
    }
  </style>
</head>
<body>

<!-- 배경 파티클 -->
<div id="particles"></div>

<!-- 배너 -->
<div class="banner">
  <h1>✦  CLAUDE CODE  DANCE  ✦</h1>
</div>

<!-- 스테이지 -->
<div id="stage">
  <!-- 로고 -->
  <div id="logo-wrap">
    <svg id="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <!-- 스타버스트 8개 꼭지 -->
      <polygon points="50,8 54,40 50,44 46,40" fill="#e07b39"/>
      <polygon points="92,50 60,54 56,50 60,46" fill="#e07b39"/>
      <polygon points="50,92 46,60 50,56 54,60" fill="#e07b39"/>
      <polygon points="8,50 40,46 44,50 40,54" fill="#e07b39"/>
      <polygon points="79,21 57,46 52,44 55,38" fill="#ff8c42"/>
      <polygon points="79,79 55,62 57,56 63,57" fill="#ff8c42"/>
      <polygon points="21,79 45,55 51,57 48,63" fill="#ff8c42"/>
      <polygon points="21,21 45,44 43,50 37,47" fill="#ff8c42"/>
      <!-- 중앙 원 -->
      <circle cx="50" cy="50" r="22" fill="#cc6b2e"/>
      <circle cx="50" cy="50" r="19" fill="#e07b39"/>
    </svg>
    <!-- 눈 -->
    <div class="eye left" id="eye-l"></div>
    <div class="eye right" id="eye-r"></div>
  </div>

  <!-- 몸통 -->
  <div id="body-text"><pre id="body-pre"></pre></div>

  <!-- 태그 -->
  <div id="tag"></div>

  <!-- 별 -->
  <div id="stars"></div>
</div>

<div id="hint">Ctrl+C 대신 그냥 즐겨요 🎵</div>

<script>
// ── 댄스 프레임 정의 ─────────────────────────────────────────
const frames = [
  { body: `        ║        \n      ══╬══      \n        ║        \n       ╱ ╲       \n      ╱   ╲      `, tag: "♪  준비됐나요?  ♫" },
  { body: `   \\    ║        \n  ★══╬══         \n        ║        \n       ╱ ╲       \n      ╱   ╲      `, tag: "💃  흔들흔들~  💃" },
  { body: `   \\    ║    /   \n  ★══╬══★       \n       ║         \n      ╱ ╲        \n     ╱   ╲       `, tag: "🎵  예예예!!  🎵" },
  { body: `        ║    /   \n        ╬══★     \n        ║        \n       ╱ ╲       \n      ╱   ╲      `, tag: "🕺  탭탭탭~  🕺" },
  { body: `   \\        /    \n    ╲      ╱     \n  ★══╪══★       \n      ╱    ╲     \n     ╱      ╲    `, tag: "🔥  브레이크!!  🔥" },
  { body: `       ╱║╲       \n      ╱ ║ ╲      \n     ╱  ║  ╲     \n         ║       \n        ╱╲       `, tag: "⭐  점프!!  ⭐" },
  { body: `      ──║──      \n   ══╬═══╬══     \n        ║        \n      ──┼──      \n     ╱     ╲     `, tag: "🌀  스피인~  🌀" },
  { body: `    ╲   ║   ╱    \n     ╲  ║  ╱     \n  ★══╪══★       \n       ╱ ╲       \n      ╱   ╲      `, tag: "💥  FINALE!!  💥" },
];

const starPats = ['✦','★','✧','✦','✵','✶'];

let tick = 0;
let frameIdx = 0;

const bodyEl  = document.getElementById('body-pre');
const tagEl   = document.getElementById('tag');
const starsEl = document.getElementById('stars');
const logoSvg = document.getElementById('logo-svg');

function getStars(t) {
  const a = starPats[t % starPats.length];
  const b = starPats[(t+2) % starPats.length];
  const c = starPats[(t+4) % starPats.length];
  return `${a}  ${b}  ${c}  ♪   ♫   ♪  ${c}  ${b}  ${a}`;
}

// 로고 표정 전환
const expressions = [
  { scale: 'scaleY(1)',   rot: '0deg'   },
  { scale: 'scaleY(0.1)',rot: '0deg'   },  // blink
  { scale: 'scaleY(1)',   rot: '5deg'   },
  { scale: 'scaleY(1.2)',rot: '-5deg'  },
];
const eyeL = document.getElementById('eye-l');
const eyeR = document.getElementById('eye-r');

function animate() {
  const f = frames[frameIdx % frames.length];

  // 몸통
  bodyEl.textContent = f.body;
  tagEl.textContent  = f.tag;
  starsEl.textContent = getStars(tick);

  // 로고 흔들기
  const angle = Math.sin(tick * 0.7) * 8;
  logoSvg.style.transform = `rotate(${angle}deg)`;

  // 눈 깜박 (특정 프레임)
  if (frameIdx % frames.length === 4) {
    eyeL.style.transform = eyeR.style.transform = 'translateY(-60%) scaleY(0.1)';
  } else {
    eyeL.style.transform = eyeR.style.transform = '';
  }

  // 점프 프레임: 스테이지 살짝 위로
  const stage = document.getElementById('stage');
  if (frameIdx % frames.length === 5) {
    stage.style.transform = 'translateY(-18px)';
  } else {
    stage.style.transform = '';
  }

  tick++;
  frameIdx++;
}

setInterval(animate, 180);
animate();

// ── 파티클 생성 ──────────────────────────────────────────────
const particleSymbols = ['✦','★','♪','♫','✧','🎵','🔥','⭐'];
const container = document.getElementById('particles');

function spawnParticle() {
  const el = document.createElement('div');
  el.className = 'particle';
  el.textContent = particleSymbols[Math.floor(Math.random() * particleSymbols.length)];
  el.style.left = Math.random() * 100 + 'vw';
  el.style.color = `hsl(${25 + Math.random()*30}, 100%, 60%)`;
  const dur = 4 + Math.random() * 5;
  el.style.animationDuration = dur + 's';
  el.style.animationDelay = '-' + (Math.random() * dur) + 's';
  el.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
  container.appendChild(el);
  setTimeout(() => el.remove(), dur * 1000 + 500);
}

setInterval(spawnParticle, 400);
for (let i = 0; i < 15; i++) spawnParticle();
</script>
</body>
</html>

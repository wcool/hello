<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Code Dance ✦</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@700&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#0d0d0d;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      min-height:100vh;
      font-family:'Fira Code',monospace;
      overflow:hidden;
      user-select:none;
    }

    /* banner */
    .banner {
      position:relative; z-index:1;
      border:2.5px solid #e07b39; border-radius:12px;
      padding:8px 32px; margin-bottom:16px;
      background:rgba(224,123,57,.07);
      animation:bannerGlow 2s ease-in-out infinite alternate;
    }
    @keyframes bannerGlow {
      from { box-shadow:0 0 20px rgba(224,123,57,.3); }
      to   { box-shadow:0 0 50px rgba(255,180,50,.5); border-color:#ffb432; }
    }
    .banner h1 {
      font-size:1.3rem; font-weight:700; letter-spacing:5px; text-align:center;
      background:linear-gradient(90deg,#e07b39,#ffb432,#ff6a00,#e07b39);
      background-size:200%;
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      animation:shimmer 2s linear infinite;
    }
    @keyframes shimmer { to { background-position:200%; } }

    /* game canvas container */
    #game-container {
      position:relative;
      width:800px; max-width:98vw;
      height:420px;
      border:2px solid rgba(224,123,57,0.3);
      border-radius:16px;
      overflow:hidden;
      background:linear-gradient(180deg, #0d0d0d 0%, #111118 70%, #0d1a0d 100%);
      box-shadow:0 0 40px rgba(224,123,57,0.15);
    }

    /* ground */
    #ground {
      position:absolute; bottom:0; left:0; right:0;
      height:50px;
      background:linear-gradient(0deg, #1a3a1a 0%, #0d2010 60%, transparent 100%);
      border-top:2px solid rgba(100,220,100,0.25);
    }
    /* ground dots */
    #ground::before {
      content:'';
      position:absolute; top:4px; left:0; right:0; height:1px;
      background:repeating-linear-gradient(
        90deg, transparent, transparent 40px,
        rgba(100,220,100,0.12) 40px, rgba(100,220,100,0.12) 41px
      );
    }

    /* background stars */
    .bg-star {
      position:absolute;
      color:rgba(224,123,57,0.3);
      font-size:.7rem;
      animation:twinkle 2s ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity:.2; } to { opacity:.8; }
    }

    /* dancer SVG */
    #dancer-svg {
      position:absolute;
      width:110px; height:180px;
      overflow:visible;
      filter:drop-shadow(0 0 10px rgba(224,123,57,0.5));
      /* JS controls left, bottom */
    }

    /* jump particles */
    .jump-par {
      position:absolute;
      font-size:.8rem;
      pointer-events:none;
      animation:jumpPar .6s ease-out forwards;
    }
    @keyframes jumpPar {
      0%   { transform:translate(0,0) scale(1); opacity:1; }
      100% { transform:translate(var(--dx), var(--dy)) scale(.3); opacity:0; }
    }

    /* hint bar */
    #hints {
      margin-top:12px;
      display:flex; gap:20px;
      font-size:.8rem; color:rgba(224,123,57,0.6);
      letter-spacing:1px;
      position:relative; z-index:1;
    }
    .hint-key {
      display:inline-block;
      border:1px solid rgba(224,123,57,0.4);
      border-radius:5px; padding:2px 8px;
      color:#e07b39;
    }

    /* tag */
    #tag {
      margin-top:10px;
      font-size:.95rem; font-weight:700; color:#ffb432;
      text-shadow:0 0 10px #ff6a00;
      min-height:1.5rem;
      position:relative; z-index:1;
      animation:tagPulse .9s ease-in-out infinite alternate;
    }
    @keyframes tagPulse {
      from { opacity:.7; } to { opacity:1; }
    }

    /* mobile controls */
    #mobile-controls {
      display:none;
      margin-top:16px; gap:12px;
      position:relative; z-index:1;
    }
    .mb-btn {
      width:56px; height:56px; border-radius:12px;
      background:rgba(224,123,57,0.15);
      border:2px solid rgba(224,123,57,0.4);
      color:#e07b39; font-size:1.4rem;
      cursor:pointer; display:flex;
      align-items:center; justify-content:center;
      -webkit-tap-highlight-color:transparent;
      transition:background .1s;
    }
    .mb-btn:active { background:rgba(224,123,57,0.35); }
    @media (max-width:600px) {
      #mobile-controls { display:flex; }
    }
  </style>
</head>
<body>

<div class="banner"><h1>✦  CODE DANCE  ✦</h1></div>

<div id="game-container">
  <!-- BG stars (injected by JS) -->
  <div id="ground"></div>

  <svg id="dancer-svg" viewBox="-30 -160 110 180" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="hg" cx="50%" cy="50%" r="50%">
        <stop offset="0%"  stop-color="#ff9d4e"/>
        <stop offset="100%" stop-color="#cc5a00"/>
      </radialGradient>
      <filter id="glow">
        <feGaussianBlur stdDeviation="2.5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- body group: pivot at feet (0,0) -->
    <g id="body-group">

      <!-- LEGS (hip=0,-95) -->
      <line id="leg-lu" x1="0" y1="-95" x2="-8"  y2="-55" stroke="#e0e0e0" stroke-width="3.5" stroke-linecap="round"/>
      <line id="leg-ll" x1="-8" y1="-55" x2="-6" y2="0"   stroke="#e0e0e0" stroke-width="3"   stroke-linecap="round"/>
      <line id="leg-ru" x1="0" y1="-95" x2="8"   y2="-55" stroke="#e0e0e0" stroke-width="3.5" stroke-linecap="round"/>
      <line id="leg-rl" x1="8" y1="-55" x2="6"   y2="0"   stroke="#e0e0e0" stroke-width="3"   stroke-linecap="round"/>

      <!-- SPINE -->
      <line id="spine" x1="0" y1="-95" x2="0" y2="-140" stroke="#e0e0e0" stroke-width="4" stroke-linecap="round"/>

      <!-- ARMS (shoulder=0,-130) -->
      <line id="arm-lu" x1="0" y1="-130" x2="-28" y2="-110" stroke="#e0e0e0" stroke-width="3.5" stroke-linecap="round"/>
      <line id="arm-ll" x1="-28" y1="-110" x2="-42" y2="-92" stroke="#e0e0e0" stroke-width="3" stroke-linecap="round"/>
      <line id="arm-ru" x1="0" y1="-130" x2="28"  y2="-110" stroke="#e0e0e0" stroke-width="3.5" stroke-linecap="round"/>
      <line id="arm-rl" x1="28"  y1="-110" x2="42"  y2="-92" stroke="#e0e0e0" stroke-width="3" stroke-linecap="round"/>

      <!-- HEAD (center=0,-158) -->
      <g id="head" filter="url(#glow)">
        <!-- rays -->
        <g id="rays" stroke="#e07b39" stroke-width="5" stroke-linecap="round">
          <line x1="0" y1="-178" x2="0"   y2="-196"/>
          <line x1="0" y1="-138" x2="0"   y2="-120"/>
          <line x1="-20" y1="-158" x2="-36" y2="-158"/>
          <line x1="20"  y1="-158" x2="36"  y2="-158"/>
          <line x1="-14" y1="-172" x2="-24" y2="-182"/>
          <line x1="14"  y1="-172" x2="24"  y2="-182"/>
          <line x1="-14" y1="-144" x2="-24" y2="-134"/>
          <line x1="14"  y1="-144" x2="24"  y2="-134"/>
        </g>
        <circle cx="0" cy="-158" r="20" fill="url(#hg)" stroke="#ff9d4e" stroke-width="1.5"/>
        <!-- eyes -->
        <ellipse id="eye-l" cx="-7" cy="-162" rx="3.5" ry="4" fill="white"/>
        <ellipse id="eye-r" cx="7"  cy="-162" rx="3.5" ry="4" fill="white"/>
        <circle  id="pup-l" cx="-6" cy="-161" r="1.8" fill="#111"/>
        <circle  id="pup-r" cx="8"  cy="-161" r="1.8" fill="#111"/>
        <!-- mouth -->
        <path id="mouth" d="M-6,-152 Q0,-147 6,-152" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
      </g>

    </g>
  </svg>
</div>

<div id="tag">⬅️  ➡️  로 이동,  ⬆️  로 점프!</div>

<div id="hints">
  <span><span class="hint-key">←</span> 이동</span>
  <span><span class="hint-key">→</span> 이동</span>
  <span><span class="hint-key">↑</span> 점프</span>
</div>

<div id="mobile-controls">
  <button class="mb-btn" id="btn-left">←</button>
  <button class="mb-btn" id="btn-jump">↑</button>
  <button class="mb-btn" id="btn-right">→</button>
</div>

<script>
// ─── Physics constants ─────────────────────────────────────────────────
const GRAVITY    = 0.6;
const JUMP_VEL   = -13;
const MOVE_SPEED = 4.5;
const GROUND_Y   = 370; // px from top of container (bottom padding)
const CONTAINER_W = 800;

// ─── State ────────────────────────────────────────────────────────────
let px   = 350;     // screen X (center of feet)
let py   = GROUND_Y;
let vy   = 0;       // vertical velocity
let onGround = true;
let facingRight = true;
let keys = {};
let moveAnim = 0;   // leg swing counter
let idleAnim = 0;   // idle sway counter

// ─── DOM refs ─────────────────────────────────────────────────────────
const svgEl   = document.getElementById('dancer-svg');
const bodyGrp = document.getElementById('body-group');
const legLU   = document.getElementById('leg-lu');
const legLL   = document.getElementById('leg-ll');
const legRU   = document.getElementById('leg-ru');
const legRL   = document.getElementById('leg-rl');
const armLU   = document.getElementById('arm-lu');
const armLL   = document.getElementById('arm-ll');
const armRU   = document.getElementById('arm-ru');
const armRL   = document.getElementById('arm-rl');
const eyeL    = document.getElementById('eye-l');
const eyeR    = document.getElementById('eye-r');
const pupL    = document.getElementById('pup-l');
const pupR    = document.getElementById('pup-r');
const mouthEl = document.getElementById('mouth');
const headEl  = document.getElementById('head');
const raysEl  = document.getElementById('rays');
const tagEl   = document.getElementById('tag');
const gameDiv = document.getElementById('game-container');

function setLine(el,x1,y1,x2,y2){
  el.setAttribute('x1',x1); el.setAttribute('y1',y1);
  el.setAttribute('x2',x2); el.setAttribute('y2',y2);
}

// ─── Pose definitions ─────────────────────────────────────────────────
// pivot: feet at (0,0), hip at (0,-95), shoulder at (0,-130)
const POSES = {
  idle: (t) => {
    const s = Math.sin(t*0.04)*4;
    // gentle sway
    setLine(armLU, 0,-130, -24,-115+s, ); setLine(armLL, -24,-115+s, -35,-100+s);
    setLine(armRU, 0,-130,  24,-115-s, ); setLine(armRL,  24,-115-s,  35,-100-s);
    setLine(legLU, 0,-95, -7,-50);  setLine(legLL, -7,-50, -5,0);
    setLine(legRU, 0,-95,  7,-50);  setLine(legRL,  7,-50,  5,0);
    headEl.setAttribute('transform',`rotate(${s*.5},0,-158)`);
  },
  run: (t, dir) => {
    // alternating arm/leg swing
    const p = t * 0.25;
    const la = Math.sin(p) * 28;
    const ra = Math.sin(p + Math.PI) * 28;
    // legs
    setLine(legLU, 0,-95, la*0.4,-55     ); setLine(legLL, la*0.4,-55, la*0.5, 0);
    setLine(legRU, 0,-95, ra*0.4,-55     ); setLine(legRL, ra*0.4,-55, ra*0.5, 0);
    // arms (opposite to legs)
    setLine(armLU, 0,-130, -20+ra*0.6,-112 ); setLine(armLL, -20+ra*0.6,-112, -30+ra*0.6,-96 );
    setLine(armRU, 0,-130,  20+la*0.6,-112 ); setLine(armRL,  20+la*0.6,-112,  30+la*0.6,-96 );
    // head bobs
    const bob = Math.abs(Math.sin(p)) * -3;
    headEl.setAttribute('transform',`translate(0,${bob}) rotate(${la*0.08},0,-158)`);
  },
  jump_up: () => {
    // arms up, legs tucked
    setLine(armLU, 0,-130, -30,-148); setLine(armLL, -30,-148, -44,-160);
    setLine(armRU, 0,-130,  30,-148); setLine(armRL,  30,-148,  44,-160);
    setLine(legLU, 0,-95,  -18,-72); setLine(legLL, -18,-72, -22,-52);
    setLine(legRU, 0,-95,   18,-72); setLine(legRL,  18,-72,  22,-52);
    headEl.setAttribute('transform','');
  },
  jump_down: () => {
    // legs out ready to land
    setLine(armLU, 0,-130, -28,-112); setLine(armLL, -28,-112, -40,-96);
    setLine(armRU, 0,-130,  28,-112); setLine(armRL,  28,-112,  40,-96);
    setLine(legLU, 0,-95,  -14,-58); setLine(legLL, -14,-58, -20,-18);
    setLine(legRU, 0,-95,   14,-58); setLine(legRL,  14,-58,  20,-18);
    headEl.setAttribute('transform','');
  },
};

// ─── Jump particles ────────────────────────────────────────────────────
const JUMP_SYMS = ['✦','★','⭐','💥','✧'];
function spawnJumpParticles(){
  for(let i=0;i<6;i++){
    const el = document.createElement('div');
    el.className='jump-par';
    el.textContent = JUMP_SYMS[Math.floor(Math.random()*JUMP_SYMS.length)];
    el.style.color = `hsl(${20+Math.random()*40},100%,65%)`;
    el.style.left  = (px - 10 + Math.random()*20) + 'px';
    el.style.top   = (py - 185) + 'px';
    el.style.setProperty('--dx', (Math.random()*60-30)+'px');
    el.style.setProperty('--dy', (Math.random()*-60-10)+'px');
    gameDiv.appendChild(el);
    setTimeout(()=>el.remove(), 700);
  }
}

// tags
const TAGS_IDLE = ['⬅️ ➡️ 로 이동,  ⬆️ 로 점프!','♪ 준비됐나요? ♫','✦ 이동해보세요 ✦'];
const TAGS_RUN  = ['💃 흔들흔들~ 💃','🕺 달려라!! 🕺','🎵 예예예!! 🎵'];
const TAGS_JUMP = ['⭐ 점프!! ⭐','🔥 브레이크!! 🔥','💥 하이!! 💥'];
let lastTagTime = 0;
let curTag = TAGS_IDLE[0];

function updateTag(state){
  const now = Date.now();
  if(now - lastTagTime < 800) return;
  lastTagTime = now;
  const pool = state==='run'?TAGS_RUN : state==='jump'?TAGS_JUMP : TAGS_IDLE;
  curTag = pool[Math.floor(Math.random()*pool.length)];
  tagEl.textContent = curTag;
}

// ─── Main loop ────────────────────────────────────────────────────────
let frame = 0;
let blinkTimer = 0;

function loop(){
  requestAnimationFrame(loop);
  frame++;

  const left  = keys['ArrowLeft']  || keys['a'] || keys['mobile-left'];
  const right = keys['ArrowRight'] || keys['d'] || keys['mobile-right'];
  const jump  = keys['ArrowUp']    || keys['w'] || keys['mobile-jump'];

  // horizontal movement
  if(left)  { px -= MOVE_SPEED; facingRight = false; }
  if(right) { px += MOVE_SPEED; facingRight = true;  }
  px = Math.max(60, Math.min(CONTAINER_W - 60, px));

  // jump
  if(jump && onGround){
    vy = JUMP_VEL;
    onGround = false;
    spawnJumpParticles();
  }

  // gravity
  if(!onGround){
    vy += GRAVITY;
    py += vy;
    if(py >= GROUND_Y){ py = GROUND_Y; vy = 0; onGround = true; }
  }

  // position SVG (feet at px, py in container)
  svgEl.style.left = (px - 55) + 'px';   // 55 = half viewBox width
  svgEl.style.top  = (py - 185) + 'px';  // 185 ≈ height of figure

  // flip direction
  bodyGrp.setAttribute('transform', facingRight ? '' : 'scale(-1,1)');

  // pose
  const moving = left || right;
  if(!onGround){
    const going_up = vy < 0;
    going_up ? POSES.jump_up() : POSES.jump_down();
    updateTag('jump');
  } else if(moving){
    moveAnim++;
    POSES.run(moveAnim, facingRight ? 1 : -1);
    updateTag('run');
  } else {
    idleAnim++;
    POSES.idle(idleAnim);
    if(frame%120===0) updateTag('idle');
  }

  // blink
  blinkTimer++;
  const blinking = (blinkTimer % 180) < 8;
  eyeL.setAttribute('ry', blinking ? '0.5' : '4');
  eyeR.setAttribute('ry', blinking ? '0.5' : '4');
  pupL.setAttribute('r',  blinking ? '0'   : '1.8');
  pupR.setAttribute('r',  blinking ? '0'   : '1.8');

  // glow pulse
  const g = 8 + Math.abs(Math.sin(frame*0.05))*10;
  raysEl.style.filter = `drop-shadow(0 0 ${g}px #ff8030)`;
}

// ─── Keyboard ─────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// ─── Mobile buttons ───────────────────────────────────────────────────
function mbBtn(id, key){
  const el = document.getElementById(id);
  el.addEventListener('pointerdown', ()=>{ keys[key]=true; });
  el.addEventListener('pointerup',   ()=>{ keys[key]=false; });
  el.addEventListener('pointerleave',()=>{ keys[key]=false; });
}
mbBtn('btn-left','mobile-left');
mbBtn('btn-right','mobile-right');
mbBtn('btn-jump','mobile-jump');

// ─── Background stars ─────────────────────────────────────────────────
const gc = document.getElementById('game-container');
for(let i=0;i<18;i++){
  const s = document.createElement('div');
  s.className='bg-star';
  s.textContent = ['✦','★','✧','·','·','·'][Math.floor(Math.random()*6)];
  s.style.left = Math.random()*96+'%';
  s.style.top  = Math.random()*65+'%';
  s.style.animationDelay = Math.random()*2+'s';
  s.style.animationDuration = (1.5+Math.random()*2)+'s';
  gc.appendChild(s);
}

loop();
</script>
</body>
</html>
